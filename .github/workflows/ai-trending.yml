name: "AI Trending Daily"

on:
  schedule:
    # Run daily at 08:00 UTC (16:00 Beijing time)
    - cron: "0 8 * * *"
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-trending:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch AI Trending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/fetch_ai_trending.py --out assets/data/ai-trending.json

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/ai-trending.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update AI trending data [skip ci]"
          git push
