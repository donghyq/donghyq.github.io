<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 250" font-family="SF Pro Text, PingFang SC, -apple-system, sans-serif">
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- 阶段 1 -->
  <circle cx="30" cy="35" r="14" fill="#c0501a"/>
  <text x="30" y="40" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <text x="55" y="40" font-size="13" font-weight="600" fill="#333">排队期</text>
  <rect x="135" y="20" width="60" height="30" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="165" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#bf360c">L3</text>
  <line x1="195" y1="35" x2="240" y2="35" stroke="#546e7a" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="243" y="20" width="60" height="30" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="273" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1">L2</text>
  <text x="320" y="40" font-size="10" fill="#777">prefetch_from_storage()</text>

  <!-- 阶段 2 -->
  <circle cx="30" cy="90" r="14" fill="#c0501a"/>
  <text x="30" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <text x="55" y="95" font-size="13" font-weight="600" fill="#333">调度期</text>
  <rect x="135" y="75" width="60" height="30" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="165" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1">L2</text>
  <line x1="195" y1="90" x2="240" y2="90" stroke="#546e7a" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="243" y="75" width="60" height="30" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="273" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">L1</text>
  <text x="320" y="95" font-size="10" fill="#777">load_back() via load_stream</text>

  <!-- 阶段 3 -->
  <circle cx="30" cy="145" r="14" fill="#c0501a"/>
  <text x="30" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <text x="55" y="150" font-size="13" font-weight="600" fill="#333">计算期</text>
  <text x="135" y="150" font-size="10" fill="#777">第 i 层 DMA 与第 i-1 层 Forward 并行 (LayerDoneCounter)</text>

  <!-- 阶段 4 -->
  <circle cx="30" cy="200" r="14" fill="#c0501a"/>
  <text x="30" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <text x="55" y="205" font-size="13" font-weight="600" fill="#333">完成期</text>
  <rect x="135" y="185" width="60" height="30" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="165" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#1b5e20">L1</text>
  <line x1="195" y1="200" x2="240" y2="200" stroke="#546e7a" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="243" y="185" width="60" height="30" rx="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="273" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#0d47a1">L2</text>
  <line x1="303" y1="200" x2="348" y2="200" stroke="#546e7a" stroke-width="2" marker-end="url(#arr3)"/>
  <rect x="351" y="185" width="60" height="30" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="381" y="205" text-anchor="middle" font-size="11" font-weight="600" fill="#bf360c">L3</text>
  <text x="425" y="205" font-size="10" fill="#777">write_backup() + backup_thread</text>

  <!-- 说明 -->
  <text x="340" y="242" text-anchor="middle" font-size="10" fill="#666">搬运操作始终藏在排队和计算的背后。只要 IO 延迟 ≤ 等待+计算延迟，用户感知为零。</text>
</svg>
