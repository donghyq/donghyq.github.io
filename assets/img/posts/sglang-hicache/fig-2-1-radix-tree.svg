<svg xmlns="http://www.w3.org/2000/svg" width="640" height="370" viewBox="0 0 640 370" font-family="SF Pro Text, PingFang SC, -apple-system, sans-serif">
  <!-- Root -->
  <rect x="255" y="20" width="130" height="45" rx="6" fill="#263238" stroke="#455a64" stroke-width="2"/>
  <text x="320" y="40" text-anchor="middle" font-size="13" font-weight="700" fill="#eceff1">Root</text>
  <text x="320" y="56" text-anchor="middle" font-size="10" fill="#90a4ae">空节点</text>

  <!-- Root 到 Node A 的连线 -->
  <line x1="280" y1="65" x2="195" y2="105" stroke="#78909c" stroke-width="1.5"/>
  <!-- Root 到 Node D 的连线 -->
  <line x1="360" y1="65" x2="475" y2="105" stroke="#78909c" stroke-width="1.5"/>

  <!-- Node A -->
  <rect x="105" y="105" width="180" height="55" rx="6" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
  <text x="195" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#006064">Node A</text>
  <text x="195" y="143" text-anchor="middle" font-size="10" fill="#00838f">key=[tok_0..tok_15]</text>
  <text x="195" y="155" text-anchor="middle" font-size="9" fill="#78909c">16 tokens = 1 page</text>

  <!-- Node D -->
  <rect x="400" y="105" width="180" height="55" rx="6" fill="#e0f7fa" stroke="#00838f" stroke-width="2"/>
  <text x="490" y="127" text-anchor="middle" font-size="12" font-weight="700" fill="#006064">Node D</text>
  <text x="490" y="143" text-anchor="middle" font-size="10" fill="#00838f">key=[tok_0'..tok_15']</text>
  <text x="490" y="155" text-anchor="middle" font-size="9" fill="#78909c">不同前缀的分支</text>

  <!-- Node A 到 Node B 的连线 -->
  <line x1="155" y1="160" x2="115" y2="215" stroke="#78909c" stroke-width="1.5"/>
  <!-- Node A 到 Node C 的连线 -->
  <line x1="235" y1="160" x2="295" y2="215" stroke="#78909c" stroke-width="1.5"/>

  <!-- Node B (在 GPU 中) -->
  <rect x="25" y="215" width="180" height="55" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="115" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">Node B</text>
  <text x="115" y="253" text-anchor="middle" font-size="10" fill="#2e7d32">key=[tok_16..tok_47]</text>
  <text x="115" y="265" text-anchor="middle" font-size="9" fill="#78909c">32 tokens = 2 pages</text>

  <!-- Node C (已驱逐到 Host) -->
  <rect x="235" y="215" width="180" height="55" rx="6" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="325" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#0d47a1">Node C</text>
  <text x="325" y="253" text-anchor="middle" font-size="10" fill="#1565c0">key=[tok_16..tok_31]</text>
  <text x="325" y="265" text-anchor="middle" font-size="9" fill="#78909c">evicted=True</text>

  <!-- 图例 -->
  <rect x="25" y="310" width="16" height="16" rx="3" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="47" y="323" font-size="11" fill="#333">在 GPU 中</text>
  <rect x="155" y="310" width="16" height="16" rx="3" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="177" y="323" font-size="11" fill="#333">已驱逐到 Host</text>
  <rect x="310" y="310" width="16" height="16" rx="3" fill="#e0f7fa" stroke="#00838f" stroke-width="1.5"/>
  <text x="332" y="323" font-size="11" fill="#333">普通节点</text>

  <text x="320" y="355" text-anchor="middle" font-size="10" fill="#777">树的每条边代表一段 page_aligned 的 token 序列</text>
</svg>
