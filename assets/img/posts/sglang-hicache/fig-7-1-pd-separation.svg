<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 350" font-family="SF Pro Text, PingFang SC, -apple-system, sans-serif">
  <defs>
    <marker id="arr7" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#546e7a"/>
    </marker>
    <marker id="arr7r" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10,0 0,3.5 10,7" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Prefill 节点 -->
  <rect x="30" y="40" width="260" height="250" rx="12" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">Prefill 节点</text>

  <rect x="55" y="65" width="210" height="35" rx="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="160" y="87" text-anchor="middle" font-size="11" fill="#1b5e20">GPU 前向计算 (Prefill)</text>

  <rect x="55" y="115" width="210" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="160" y="137" text-anchor="middle" font-size="11" fill="#0d47a1">L1 GPU HBM</text>

  <rect x="55" y="165" width="210" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="160" y="187" text-anchor="middle" font-size="11" fill="#0d47a1">L2 Host DRAM</text>

  <rect x="55" y="215" width="210" height="50" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="160" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#bf360c">L3: hf3fs / Mooncake</text>
  <text x="160" y="255" text-anchor="middle" font-size="9" fill="#e65100">RDMA Zero-Copy 写入</text>

  <!-- Decode 节点 -->
  <rect x="450" y="40" width="260" height="250" rx="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="580" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">Decode 节点</text>

  <rect x="475" y="65" width="210" height="35" rx="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="580" y="87" text-anchor="middle" font-size="11" fill="#1b5e20">GPU 前向计算 (Decode)</text>

  <rect x="475" y="115" width="210" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="580" y="137" text-anchor="middle" font-size="11" fill="#0d47a1">L1 GPU HBM</text>

  <rect x="475" y="165" width="210" height="35" rx="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="580" y="187" text-anchor="middle" font-size="11" fill="#0d47a1">L2 Host DRAM</text>

  <rect x="475" y="215" width="210" height="50" rx="5" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="580" y="237" text-anchor="middle" font-size="11" font-weight="600" fill="#bf360c">L3: hf3fs / Mooncake</text>
  <text x="580" y="255" text-anchor="middle" font-size="9" fill="#e65100">RDMA Zero-Copy 读取</text>

  <!-- 中间连接 L3 作为总线 -->
  <line x1="265" y1="240" x2="453" y2="240" stroke="#bf360c" stroke-width="3" marker-end="url(#arr7)"/>
  <text x="370" y="232" text-anchor="middle" font-size="10" font-weight="600" fill="#bf360c">RDMA 或共享存储</text>

  <!-- ZMQ 事件通知 (上方虚线) -->
  <line x1="265" y1="80" x2="453" y2="80" stroke="#7b1fa2" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr7)"/>
  <text x="370" y="72" text-anchor="middle" font-size="10" fill="#7b1fa2">ZMQ 事件通知</text>

  <!-- 说明 -->
  <text x="370" y="315" text-anchor="middle" font-size="10" fill="#666">Prefill 计算完毕后 backup 到 L3，通过 ZMQ 通知 Decode 节点。</text>
  <text x="370" y="333" text-anchor="middle" font-size="10" fill="#666">Decode 节点 prefetch_from_storage() 通过 RDMA/hf3fs 零拷贝拉取 KV Cache。</text>
</svg>
