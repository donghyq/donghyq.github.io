theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: Hanyu Dong
tagline: AI Infra / Search Engineer
description: 搜索系统工程师，专注 AI Search 与 LLM Infra

url: "https://donghyq.github.io"

github:
  username: donghyq

social:
  name: Hanyu Dong
  email: ""
  links:
    - https://github.com/donghyq

avatar: /assets/img/avatar.jpg

permalink: /posts/:title/

toc: true

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
